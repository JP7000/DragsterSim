<!-- ... EVERYTHING ABOVE IS UNCHANGED -->

<div class="range-card" id="range-card">
  <div class="range-note" id="range-note" style="color:var(--muted2);">
    Run simulation to see model note.
  </div>
</div>

<!-- ✅ FIXED FORCES CARD -->
<div class="breakdown-card" id="forces-card">

  <div class="breakdown-title">
    What's slowing your car down?
  </div>

  <!-- AT LAUNCH -->
  <div style="font-size:.58rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem;">
    At Launch
  </div>

  <div class="breakdown-row">
    <div class="bd-label">Wheel Spin-up</div>
    <div class="bd-bar-wrap">
      <div class="bd-bar" id="bar-rot" style="background:var(--yellow);width:0%"></div>
    </div>
    <div class="bd-val" id="val-rot">—</div>
  </div>

  <!-- AT PEAK SPEED -->
  <div style="font-size:.58rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:.7rem 0 .4rem;">
    At Peak Speed
  </div>

  <div class="breakdown-row">
    <div class="bd-label">Air Resistance</div>
    <div class="bd-bar-wrap">
      <div class="bd-bar" id="bar-aero" style="background:var(--accent);width:0%"></div>
    </div>
    <div class="bd-val" id="val-aero">—</div>
  </div>

</div>

<!-- ✅ SAVED RUNS CARD (now no longer broken) -->
<div class="breakdown-card" id="saved-runs-card">
  <div class="breakdown-title" style="display:flex;justify-content:space-between;align-items:center;">
    <span>Saved Runs</span>
    <div style="display:flex;gap:.5rem;">
      <button class="mini-btn danger" onclick="clearAllRuns()">✕ Clear All</button>
    </div>
  </div>

  <div id="saved-runs-list">
    <div class="empty-state" id="saved-runs-empty">
      <div class="empty-icon">◎</div>
      <div class="empty-text">No saved runs yet</div>
    </div>
  </div>

  <div id="time-chart-wrap" style="display:none;margin-top:1rem;">
    <div style="font-size:.62rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;">
      Finish Time Comparison
    </div>
    <canvas id="time-chart"></canvas>
  </div>
</div>

</div> <!-- results-grid -->
</div> <!-- main -->
</div> <!-- app -->

<script src="physics.js"></script>
<script src="ui.js"></script>
</body>
</html>
